<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Помощник - Full Site</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 360px;
      padding: 0;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8fafc;
    }

    .popup-header {
      background: linear-gradient(140deg, #1e293b 0%, #334155 100%);
      padding: 18px 18px 14px;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .popup-header::before {
      content: '';
      position: absolute;
      top: -40%;
      left: -10%;
      width: 60%;
      height: 180%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .popup-header h2 {
      margin: 0 0 2px 0;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .popup-header p {
      margin: 0;
      font-size: 12px;
      opacity: 0.88;
    }

    .popup-body {
      padding: 16px;
    }

    h2 {
      margin: 0 0 8px 0;
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
    }

    p {
      margin: 0 0 16px 0;
      font-size: 13px;
      line-height: 1.5;
      color: #666;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s;
      margin-bottom: 8px;
      box-shadow: 0 4px 14px rgba(79, 70, 229, 0.3);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(79, 70, 229, 0.42);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary {
      background: white;
      color: #334155;
      border: 1.5px solid rgba(100, 116, 139, 0.25);
      box-shadow: 0 2px 6px rgba(15, 23, 42, 0.06);
    }

    .btn-secondary:hover {
      background: #f1f5f9;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.1);
    }

    .btn-warning {
      background: #4f46e5;
    }

    .status {
      margin-top: 16px;
      padding: 12px;
      background: white;
      border-radius: 10px;
      font-size: 12px;
      color: #666;
      border: 1px solid rgba(230, 162, 88, 0.2);
    }

    .status.active {
      border-color: #4CAF50;
      background: #f1f8f4;
      color: #2e7d32;
    }

    .status.indexing {
      border-color: #6366f1;
      background: #eef2ff;
      color: #3730a3;
    }

    .status.error {
      border-color: #ef4444;
      background: #fef2f2;
      color: #dc2626;
    }

    .divider {
      height: 1px;
      background: rgba(230, 162, 88, 0.2);
      margin: 14px 0;
    }

    .info {
      font-size: 11px;
      color: #64748b;
      line-height: 1.4;
    }

    .progress {
      margin-top: 12px;
      font-size: 12px;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <h2>💬 Помощник</h2>

    <p>Виртуальный помощник с поиском по всему сайту</p>
  </div>

  <div class="popup-body">
    <button id="toggleChat" class="btn">
      Открыть чат
    </button>

    <div class="divider"></div>

    <p style="margin-bottom: 8px; font-weight: 600; color: #334155;">Индексация сайта:</p>

    <button id="indexWebsite" class="btn btn-warning">
      📚 Проиндексировать весь сайт
    </button>

    <div class="info">
      Парсит все доступные страницы сайта без лимита. После индексации бот сможет отвечать на вопросы по любой странице сайта, не только текущей.
    </div>

    <button id="checkStatus" class="btn btn-secondary">
      🔍 Проверить статус индексации
    </button>

    <div id="status" class="status">
      Готов к работе
    </div>

    <div id="progress" class="progress" style="display: none;">
      Индексация займёт 5-15 минут...
    </div>

    <div class="divider"></div>

    <button id="reloadExtension" class="btn btn-secondary" style="font-size:13px; padding:9px;">
      🔄 Обновить расширение и страницу
    </button>
  </div>

  <script src="popup-fullsite.js"></script>
</body>
</html>
